<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" 
      content="default-src 'self'; 
               script-src 'self' https://cdnjs.cloudflare.com; 
               connect-src http://localhost:6767;">
    <link rel="stylesheet" href="styles.css">
    <title>frontend</title>
    <!--Primary script file is defined at bottom of body-->
    <script src="../../libs/pdf-js-legacy/pdf.js"></script>
  </head>
  <body>
    <!--home-->
    <div id="scr-home" class="screen">
      <button id="add-syllabus-btn" class="add-syllabus-btn">Add Syllabus</button>
      <button id="see-syllabus-btn">See Syllabus</button>
      <button id="quick-info-btn">Quick Info</button>
      <div class="search-container">
        <!--id="search-input" required by index.js to read this value when search button is pressed-->
        <input id="search-input" type="text" class="search-input">
        <button id="search-btn" class="search-btn">Search</button>
      </div>
      
    </div>

    <!--add syllabus-->
    <div id="scr-add-syl" class="screen hidden">
      <button id="add-syl-back-btn" class="back-btn">Back</button>
      <label>Course Name</label>
      <input id="course-input" type="text" class="search-input">
      <label class="file-input-label">
        <input id="file-input" type="file" accept=".pdf,.txt" class="file-input">
        Click to select .pdf or .txt
      </label>
      <button id="process-syllabus-btn" class="add-syllabus-btn">Add Syllabus</button>      
    </div>

    <!--see syllabus-->
    <div id="scr-see-syl" class="screen hidden">
      <button id="see-syl-back-btn" class="back-btn">Back</button>
      <label>Select Course</label>
      <select></select>
      <div></div>
    </div>

    <!--quick info-->
    <div id="scr-quick-info" class="screen hidden">
      <button id="quick-info-back-btn" class="back-btn">Back</button>
      <label>Select Course</label>
      <select></select>
      <label>Select Topic</label>
      <select></select>
      <div></div>
    </div>

    <!--search results-->
    <div id="scr-search-results" class="screen hidden">
      <button id="search-back-btn" class="back-btn">Back</button>
      <div class="searchContainer">
        <input id="search-results-input" type="text" class="search-input" placeholder="Ask a question...">
        <button id="search-results-btn" class="search-btn">Search</button>
      </div>
      
      <div></div>
    </div>

    <script>
      pdfjsLib.GlobalWorkerOptions.workerSrc = 
        "../../libs/pdf-js-legacy/pdf.worker.js";
    </script>

    <script src="index.js"></script>
  </body>
</html>
