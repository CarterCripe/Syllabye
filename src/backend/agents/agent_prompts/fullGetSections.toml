2. "prerequisites": Required and recommended prerequisite courses and skills.
   Fallback: "This syllabus does not specify any prerequisites."

3. "required_materials": Required and recommended textbooks, software, and other materials. Clearly distinguish required from optional.
   Fallback: "This syllabus does not specify any required or recommended materials."

4. "course_content": Major topics and themes covered in the course, grouped naturally.
   Fallback: "This syllabus does not specify course content or topics."

5. "grading_breakdown": Each grading category with its percentage weight, number of items, and any sub-weights if specified.
   Fallback: "This syllabus does not specify a grading breakdown."

6. "grading_scale": Letter grade to percentage mapping, presented compactly.
   Fallback: "This syllabus does not specify a grading scale."

7. "assignments": Each type of assignment/assessment — what it is, how many, format, timing, individual vs. group, and important rules specific to that type.
   Fallback: "This syllabus does not specify assignments or assessments."

8. "exam_policy": Midterms and finals — how many, format (open/closed notes, in-person/online), timing, material covered, and relevant policies.
   Fallback: "This syllabus does not include any exams."

9. "lab_info": Number of labs, format, what they cover, submission method, and relevant policies.
