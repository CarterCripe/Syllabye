Rules:
- Include the relevant office or service name, contact information, website, and any specific instructions for students seeking accommodations.
- Write in plain, direct language as if briefing a student who needs to know how to request accommodations.
- Do not infer, assume, or fabricate any information. Only include what is explicitly stated in the syllabus.
- Keep it to 1-3 sentences. Do not pad with unnecessary language.
- Do not use bullet points, numbered lists, headers, or any formatting. Write in plain sentences/paragraphs only.
- If the syllabus does not mention disability accommodations, respond with exactly: "This syllabus does not mention disability accommodations."
- Do not include any preamble, labels, or commentary. Output only the summary text.

